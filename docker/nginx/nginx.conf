# nginx.conf — Produccion / Cliente Cero
# SaaS Gestion de Canchas (CANCHERO!)
#
# Este archivo es la plantilla de referencia para el despliegue en produccion.
# En desarrollo local se usa el dev server de Vite directamente (sin Nginx).
#
# Uso:
#   - Reemplazar DOMINIO_PRODUCCION por el dominio real del servidor (ej: canchero.app).
#   - Reemplazar TENANT_SLUG por el subdominio del complejo (ej: demo, complejo2, etc.).
#   - Activar el bloque SSL despues de correr Certbot (ver comentarios).
#   - Copiar o montar este archivo en /etc/nginx/conf.d/ dentro del contenedor Nginx.
#
# Requisitos previos en produccion:
#   - Certbot instalado y corriendo para Let's Encrypt.
#   - DNS del dominio apuntando a la IP del servidor.
#   - docker compose up con DJANGO_DEBUG=False.

# ---------------------------------------------------------------------------
# Upstream: backend Django (gunicorn/uvicorn en el contenedor "backend")
# ---------------------------------------------------------------------------
upstream django_backend {
    server backend:8000;
}

# ---------------------------------------------------------------------------
# Upstream: frontend React (build estatico servido por Nginx, o dev server)
# En produccion el frontend corre como build estatico; ver frontend.Dockerfile.
# ---------------------------------------------------------------------------
upstream vite_frontend {
    server frontend:5173;
}

# ---------------------------------------------------------------------------
# Bloque HTTP -> HTTPS redirect (activar cuando SSL este configurado)
# ---------------------------------------------------------------------------
# server {
#     listen 80;
#     server_name .DOMINIO_PRODUCCION;
#     return 301 https://$host$request_uri;
# }

# ---------------------------------------------------------------------------
# Tenant de prueba / demo
# Subdominio: demo.DOMINIO_PRODUCCION
# ---------------------------------------------------------------------------
server {
    listen 80;
    # listen 443 ssl;  # Descomentar cuando SSL este activo
    server_name demo.DOMINIO_PRODUCCION;

    # ssl_certificate     /etc/letsencrypt/live/demo.DOMINIO_PRODUCCION/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/demo.DOMINIO_PRODUCCION/privkey.pem;

    # API backend
    location /api/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Archivos estaticos de Django (admin, swagger)
    location /static/ {
        alias /app/staticfiles/;
    }

    # Frontend React
    location / {
        proxy_pass http://vite_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ---------------------------------------------------------------------------
# Panel de System Admin (equipo interno)
# Subdominio: platform.DOMINIO_PRODUCCION
#
# Acceso restringido: solo el equipo de la plataforma opera aqui.
# Require autenticacion con rol system_admin (validado en el backend).
# ---------------------------------------------------------------------------
server {
    listen 80;
    # listen 443 ssl;  # Descomentar cuando SSL este activo
    server_name platform.DOMINIO_PRODUCCION;

    # ssl_certificate     /etc/letsencrypt/live/platform.DOMINIO_PRODUCCION/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/platform.DOMINIO_PRODUCCION/privkey.pem;

    # Opcional: restringir acceso por IP del equipo interno
    # allow 203.0.113.0/24;
    # deny all;

    # API backend (endpoints /api/platform/ requieren rol system_admin)
    location /api/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Archivos estaticos de Django
    location /static/ {
        alias /app/staticfiles/;
    }

    # Frontend React (mismo build, el routing interno decide que mostrar)
    location / {
        proxy_pass http://vite_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ---------------------------------------------------------------------------
# Agregar un bloque "server" por cada nuevo tenant en produccion.
# Copiar el bloque de "demo" y reemplazar el subdominio.
# ---------------------------------------------------------------------------
