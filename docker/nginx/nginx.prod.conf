# nginx.prod.conf — Reverse proxy de produccion (nip.io / HTTP)
# SaaS Gestion de Canchas (CANCHERO!)
#
# Rol: unico punto de entrada externo (puerto 80).
# Ruteo por subdominio:
#   platform.*     → frontend (panel System Admin)
#   app.*          → frontend (login centralizado)
#   *.nip.io       → frontend (tenants, fallback SPA)
#   /api/*         → backend:8000 (en cualquier host)
#   /static/*      → staticfiles de Django (volumen compartido)
#   /api/docs/*    → backend:8000 (Swagger UI)
#   sin subdominio / IP directa → landing (nginx interno)
#
# Sin SSL: presentacion academica con nip.io.
# Para activar SSL en el futuro: agregar Certbot + Let's Encrypt y
# habilitar los bloques ssl comentados en este archivo.

# ---------------------------------------------------------------------------
# Workers: auto usa todos los cores disponibles del contenedor.
# ---------------------------------------------------------------------------
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip para reducir transferencia de datos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # Ocultar version de Nginx en headers de error
    server_tokens off;

    # ---------------------------------------------------------------------------
    # Upstream: backend Django (gunicorn en el contenedor "backend")
    # ---------------------------------------------------------------------------
    upstream django_backend {
        server backend:8000;
        keepalive 32;
    }

    # ---------------------------------------------------------------------------
    # Upstream: frontend React (Nginx sirviendo el build estatico)
    # ---------------------------------------------------------------------------
    upstream react_frontend {
        server frontend:80;
        keepalive 16;
    }

    # ---------------------------------------------------------------------------
    # Upstream: landing page (Nginx estatico)
    # ---------------------------------------------------------------------------
    upstream landing_page {
        server landing:80;
    }

    # ---------------------------------------------------------------------------
    # Mapa: determina si el host es un subdominio conocido (platform / app / tenant).
    # Si el host es la IP directa o "localhost" sin subdominio → landing.
    # Cualquier subdominio nip.io → frontend.
    # ---------------------------------------------------------------------------
    map $host $is_subdomain {
        default         0;
        "~^platform\."  1;
        "~^app\."       1;
        "~^[^.]+\."     1;
    }

    # ---------------------------------------------------------------------------
    # LANDING — IP directa o sin subdominio reconocido
    # Captura: acceso por IP cruda (ej: http://123.456.789.000/)
    # Se usa "default_server" para que sea el catch-all cuando no hay match.
    # ---------------------------------------------------------------------------
    server {
        listen 80 default_server;

        # Logs para diagnostico
        access_log /var/log/nginx/landing_access.log;
        error_log  /var/log/nginx/landing_error.log warn;

        location / {
            proxy_pass http://landing_page;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ---------------------------------------------------------------------------
    # PLATFORM ADMIN — platform.IP.nip.io
    # Panel interno del equipo (system_admin). Sirve el frontend React;
    # el backend valida el rol system_admin via JWT.
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name ~^platform\..*;

        access_log /var/log/nginx/platform_access.log;
        error_log  /var/log/nginx/platform_error.log warn;

        # API y Swagger al backend
        location /api/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Static files de Django (admin, swagger assets)
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Todo lo demas al frontend React (SPA fallback)
        location / {
            proxy_pass http://react_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }

    # ---------------------------------------------------------------------------
    # APP — app.IP.nip.io
    # Login centralizado (jugadores buscando su complejo).
    # Mismo tratamiento que platform: SPA React + API.
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name ~^app\..*;

        access_log /var/log/nginx/app_access.log;
        error_log  /var/log/nginx/app_error.log warn;

        location /api/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass http://react_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }

    # ---------------------------------------------------------------------------
    # TENANTS — cualquier subdominio *.nip.io no capturado arriba
    # (ej: demo.IP.nip.io, lugano.IP.nip.io, etc.)
    # django-tenants resuelve el tenant por el header Host que llega al backend.
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        # Captura cualquier subdominio de nip.io que no sea platform.* ni app.*
        # La regex usa un grupo de captura para hostnames compuestos (IP embebida).
        server_name ~^(?!platform\.|app\.)(?![\d.]+$)(?<tenant>[^.]+)\..*;

        access_log /var/log/nginx/tenant_access.log;
        error_log  /var/log/nginx/tenant_error.log warn;

        # API al backend — el Host header llega intacto para que django-tenants
        # identifique el esquema correcto.
        location /api/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Frontend React — SPA con fallback a index.html
        location / {
            proxy_pass http://react_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
