# frontend/nginx.conf — Nginx para el contenedor frontend en produccion
# Sirve el build estatico de React (dist/) con soporte SPA.
#
# Caracteristicas:
#   - Fallback a index.html para React Router (SPA).
#   - Gzip habilitado para reducir tiempo de carga en mobile.
#   - Cache agresivo en assets con hash de contenido (JS/CSS/fonts).
#   - Sin SSL: lo gestiona el Nginx reverse proxy externo.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff
        font/woff2;
    gzip_min_length 256;

    # Assets con hash en el nombre (generados por Vite):
    # cache agresivo — el hash cambia cuando cambia el contenido.
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: cualquier ruta que no sea un archivo estatico
    # retorna index.html para que React Router maneje el routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deshabilitar logs de favicon para reducir ruido
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Ocultar version de Nginx
    server_tokens off;
}
