# .github/workflows/ci.yml
# Integración continua — SaaS Gestión de Canchas (CANCHERO!)
#
# Se ejecuta en cada PR hacia master y en cada push a master.
# Valida que el backend compila, migra y pasa todos los tests antes de mergear.
#
# Servicios de soporte: PostgreSQL 16 nativo de GitHub Actions
# (más rápido que levantar el stack Docker completo en CI).
#
# Cache: pip y node_modules cacheados por hash de requirements.txt / package-lock.json.

name: CI — Tests y Build

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Tests del backend Django
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Backend — Pytest (Django + django-tenants)
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: canchero_test
          POSTGRES_USER: canchero
          POSTGRES_PASSWORD: canchero_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U canchero -d canchero_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Variables mínimas para que Django arranque en el entorno de test.
      # Estos valores son exclusivos del runner de CI: no son secretos reales.
      DJANGO_SECRET_KEY: "ci-insecure-key-only-for-tests-not-a-real-secret"
      DJANGO_DEBUG: "True"
      POSTGRES_DB: canchero_test
      POSTGRES_USER: canchero
      POSTGRES_PASSWORD: canchero_test_pass
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      # django-tenants requiere un ALLOWED_HOSTS con el dominio del tenant de test
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,testserver,*.localhost"
      DJANGO_CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      # Tenant de prueba que crea entrypoint.sh (usado en TenantTestCase)
      TENANT_DEMO_DOMAIN: "demo.localhost"
      TENANT_DEMO_NAME: "Complejo Demo"
      TENANT_DEMO_SCHEMA: "demo"
      # Platform (ADR-013)
      PLATFORM_DOMAIN: "platform.localhost"
      # Simple JWT usa DJANGO_SECRET_KEY como signing key (comportamiento por defecto).
      # No se necesita una variable separada.

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache de dependencias pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Verificar migraciones (migrate_schemas --shared)
        working-directory: backend
        run: |
          python manage.py migrate_schemas --shared --noinput

      - name: Verificar migraciones de tenants (migrate_schemas)
        working-directory: backend
        run: |
          python manage.py migrate_schemas --noinput

      - name: Correr tests con pytest
        working-directory: backend
        run: |
          pytest --tb=short -v

  # ---------------------------------------------------------------------------
  # Job 2: Build del frontend (Vite + TypeScript)
  # Verifica que el build de producción no tiene errores de tipos ni de bundler.
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend — Build de producción (Vite + TypeScript)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias npm
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build de producción
        working-directory: frontend
        env:
          # Valores dummy para que Vite no falle por variables faltantes
          VITE_API_BASE_URL: "http://localhost:8000/api"
          VITE_CENTRAL_API_URL: "http://localhost:8000/api"
        run: npm run build

      - name: Verificar que el directorio dist fue generado
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "ERROR: El directorio frontend/dist no existe tras el build."
            exit 1
          fi
          echo "Build OK — $(find frontend/dist -type f | wc -l) archivos generados."
